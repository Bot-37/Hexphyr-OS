[package]
name = "kernel"
version = "0.1.0"
edition = "2021"

[dependencies]
x86_64 = { version = "0.14", features = ["instructions"] }
bit_field = "0.10"
bitflags = "2.4"
spin = "0.9"
log = { version = "0.4", default-features = false }
cfg-if = "1.0"

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
lto = true
opt-level = "z"
codegen-units = 1